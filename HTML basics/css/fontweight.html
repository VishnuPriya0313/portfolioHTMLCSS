<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .a{
            font-weight: normal;
        }
        .b{
            font-weight: bold;
        }
        .c{
            font-weight: bolder;
        }
        .d{
            font-weight: lighter;
        }
        .e{
            font-weight: 200;
        }
        .f{
            font-weight: 700;
        }
        *{
            font-family: Arial;
        }
    </style>
</head>
<body>
    <p class="a">This is a paragraph.</p>
    <p class="b">This is also paragraph.</p>
    <p class="c">This is another paragraph.</p>
    <p class="d">This is a also paragraph.</p>
    <p class="e">This is after paragraph.</p>
    <p class="f">This is about paragraph.</p>
</body>
</html>
